# fly.toml app configuration file
app = "scrapix-proxy"
primary_region = "iad"

[build]

[env]
  PORT = "3000"
  PROXY_PORT = "8080"
  NODE_ENV = "production"

# HTTP management interface
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  max_machines = 10
  processes = ["app"]
  
  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/proxy-health"

# TCP proxy service
[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  
  [[services.ports]]
    port = 8080
    handlers = []
    
  [services.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400
    
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[vm]
  size = "shared-cpu-1x"
  memory = 1024

[[restart]]
  policy = "always"
  retries = 3
  window = "5m"

[metrics]
  port = 9091
  path = "/metrics"