# =============================================================================
# Scrapix Docker Compose - Development Overrides
# =============================================================================
# Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This file provides development-friendly overrides:
# - Infrastructure only (build Rust services locally)
# - More verbose logging
# - Exposed debug ports
# =============================================================================

services:
  # Disable Scrapix services (run them locally for faster iteration)
  scrapix-api:
    profiles: ["full"]

  scrapix-frontier:
    profiles: ["full"]

  scrapix-crawler:
    profiles: ["full"]

  scrapix-content:
    profiles: ["full"]

  # More verbose Redpanda logging for debugging
  redpanda:
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 512M
      - --default-log-level=warn
