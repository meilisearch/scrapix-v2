# =============================================================================
# Scrapix Docker Compose
# =============================================================================
# Full development stack with all services
#
# Usage:
#   docker compose watch                    # Start with file watching (recommended)
#   docker compose up -d                    # Start all services
#   docker compose down                     # Stop (preserves build caches)
#   docker compose down -v                  # Stop and remove all volumes
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure Services
  # ---------------------------------------------------------------------------

  # Redpanda - Kafka-compatible streaming platform
  redpanda:
    image: redpandadata/redpanda:v25.3.4
    container_name: scrapix-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 2
      - --memory 2G
      - --default-log-level=info
    ports:
      - "19092:19092"  # Kafka external
      - "18081:18081"  # Schema registry
      - "18082:18082"  # Pandaproxy (REST)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redpanda Console - Web UI for Kafka
  redpanda-console:
    image: redpandadata/console:v3.0.0
    container_name: scrapix-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    restart: unless-stopped

  # Dragonfly - Redis-compatible in-memory store (faster than Redis)
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: scrapix-dragonfly
    ports:
      - "6380:6379"
    volumes:
      - dragonfly_data:/data
    ulimits:
      memlock: -1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Meilisearch - Search engine
  meilisearch:
    image: getmeili/meilisearch:v1.31.0
    container_name: scrapix-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
      MEILI_LOG_LEVEL: INFO
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # PostgreSQL - Auth, accounts, API keys
  postgres:
    image: postgres:17-alpine
    container_name: scrapix-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: scrapix
      POSTGRES_USER: scrapix
      POSTGRES_PASSWORD: scrapix
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapix -d scrapix"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ClickHouse - Analytics database for crawl metrics
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: scrapix-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native TCP
    environment:
      CLICKHOUSE_DB: scrapix
      CLICKHOUSE_USER: scrapix
      CLICKHOUSE_PASSWORD: scrapix
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Topic Initialization
  # ---------------------------------------------------------------------------

  init-topics:
    image: redpandadata/redpanda:v25.3.4
    container_name: scrapix-init-topics
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        rpk topic create scrapix.urls.frontier --brokers redpanda:9092 -p 12 -r 1 || true
        rpk topic create scrapix.urls.processing --brokers redpanda:9092 -p 12 -r 1 || true
        rpk topic create scrapix.pages.raw --brokers redpanda:9092 -p 6 -r 1 || true
        rpk topic create scrapix.documents --brokers redpanda:9092 -p 6 -r 1 || true
        rpk topic create scrapix.events --brokers redpanda:9092 -p 3 -r 1 || true
        rpk topic create scrapix.dlq.urls --brokers redpanda:9092 -p 3 -r 1 || true
        rpk topic create scrapix.jobs.status --brokers redpanda:9092 -p 3 -r 1 || true
        echo "Topics created successfully!"
        rpk topic list --brokers redpanda:9092
    restart: "no"

  # ---------------------------------------------------------------------------
  # Scrapix Services
  # ---------------------------------------------------------------------------

  # API Server
  scrapix-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: cargo watch -x "run --bin scrapix-api" -w crates -w bins/scrapix-api
    container_name: scrapix-api
    depends_on:
      redpanda:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info,scrapix=debug
      HOST: 0.0.0.0
      PORT: 8080
      KAFKA_BROKERS: redpanda:9092
      REDIS_URL: redis://dragonfly:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: masterKey
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: scrapix
      CLICKHOUSE_USER: scrapix
      CLICKHOUSE_PASSWORD: scrapix
      DATABASE_URL: postgres://scrapix:scrapix@postgres:5432/scrapix
      JWT_SECRET: dev-jwt-secret-change-in-production
    volumes:
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-api:/app/target
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    develop:
      watch:
        - action: sync
          path: ./crates
          target: /app/crates
        - action: sync
          path: ./bins
          target: /app/bins
        - action: rebuild
          path: ./Cargo.toml
        - action: rebuild
          path: ./Cargo.lock

  # Frontier Service - URL deduplication and politeness
  scrapix-frontier:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: cargo watch -x "run --bin scrapix-frontier-service" -w crates -w bins/scrapix-frontier-service
    container_name: scrapix-frontier
    depends_on:
      redpanda:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info,scrapix=debug
      KAFKA_BROKERS: redpanda:9092
      KAFKA_GROUP_ID: scrapix-frontier
      DISPATCH_INTERVAL_MS: 20
      DISPATCH_BATCH_SIZE: 2000
      DOMAIN_DELAY_MS: 50
      CONCURRENT_PER_DOMAIN: 50
      BLOOM_CAPACITY: 10000000
      BLOOM_FP_RATE: "0.01"
    volumes:
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-frontier:/app/target
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./crates
          target: /app/crates
        - action: sync
          path: ./bins
          target: /app/bins
        - action: rebuild
          path: ./Cargo.toml
        - action: rebuild
          path: ./Cargo.lock

  # Crawler Worker - Fetches web pages
  scrapix-crawler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: cargo watch -x "run --bin scrapix-worker-crawler" -w crates -w bins/scrapix-worker-crawler
    container_name: scrapix-crawler
    depends_on:
      redpanda:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info,scrapix=debug
      KAFKA_BROKERS: redpanda:9092
      KAFKA_GROUP_ID: scrapix-crawlers
      CONCURRENCY: 50
      USER_AGENT: "Scrapix/1.0 (compatible; +https://github.com/quentindequelen/scrapix)"
      REQUEST_TIMEOUT: 30
      MAX_RETRIES: 3
      MAX_DEPTH: 100
      RESPECT_ROBOTS: "true"
    volumes:
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-crawler:/app/target
    restart: unless-stopped
    deploy:
      replicas: 3
    develop:
      watch:
        - action: sync
          path: ./crates
          target: /app/crates
        - action: sync
          path: ./bins
          target: /app/bins
        - action: rebuild
          path: ./Cargo.toml
        - action: rebuild
          path: ./Cargo.lock

  # Content Worker - Parses pages and indexes to Meilisearch
  scrapix-content:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: cargo watch -x "run --bin scrapix-worker-content" -w crates -w bins/scrapix-worker-content
    container_name: scrapix-content
    depends_on:
      redpanda:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info,scrapix=debug
      KAFKA_BROKERS: redpanda:9092
      KAFKA_GROUP_ID: scrapix-content
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: masterKey
      BATCH_SIZE: 2000
      CONCURRENCY: 40
      BATCH_TIMEOUT_SECS: 5
    volumes:
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-content:/app/target
    restart: unless-stopped
    deploy:
      replicas: 2
    develop:
      watch:
        - action: sync
          path: ./crates
          target: /app/crates
        - action: sync
          path: ./bins
          target: /app/bins
        - action: rebuild
          path: ./Cargo.toml
        - action: rebuild
          path: ./Cargo.lock

  # ---------------------------------------------------------------------------
  # Console (Next.js Frontend)
  # ---------------------------------------------------------------------------

  console:
    build:
      context: ./console
      dockerfile: Dockerfile.dev
    container_name: scrapix-console
    depends_on:
      scrapix-api:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_SCRAPIX_API_URL: http://localhost:8080
      SCRAPIX_API_URL: http://scrapix-api:8080
    volumes:
      - console-node-modules:/app/node_modules
      - console-next:/app/.next
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./console/src
          target: /app/src
        - action: sync
          path: ./console/public
          target: /app/public
        - action: rebuild
          path: ./console/package.json
        - action: rebuild
          path: ./console/package-lock.json
        - action: sync+restart
          path: ./console/next.config.ts
          target: /app/next.config.ts

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  # Infrastructure data
  pg_data:
    driver: local
  redpanda_data:
    driver: local
  dragonfly_data:
    driver: local
  meilisearch_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  # Rust build caches (shared across services)
  cargo-registry:
  cargo-git:
  # Per-service target dirs (avoids cargo lock contention)
  target-api:
  target-frontier:
  target-crawler:
  target-content:
  # Console build caches
  console-node-modules:
  console-next:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  default:
    name: scrapix-network
