app = "scrapix-console"
primary_region = "cdg"

[build]
  dockerfile = "../../../console/Dockerfile"
  build-context = "../../../console"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  HOSTNAME = "0.0.0.0"
