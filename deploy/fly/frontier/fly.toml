app = "scrapix-frontier"
primary_region = "cdg"

[build]
  dockerfile = "../../../Dockerfile"
  build-target = "scrapix-frontier-service"

[processes]
  app = ""

# No HTTP service — this is a Kafka consumer
# Disable auto-stop so it stays running to consume messages

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

[env]
  RUST_LOG = "info"
  KAFKA_GROUP_ID = "scrapix-frontier"
  DISPATCH_INTERVAL_MS = "20"
  DISPATCH_BATCH_SIZE = "2000"
  DOMAIN_DELAY_MS = "50"
  CONCURRENT_PER_DOMAIN = "50"
  BLOOM_CAPACITY = "100000000"
  BLOOM_FP_RATE = "0.001"
