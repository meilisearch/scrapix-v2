app = "scrapix-meilisearch"
primary_region = "cdg"

[build]
  image = "getmeili/meilisearch:v1.31.0"

[processes]
  app = "meilisearch"

[[services]]
  protocol = "tcp"
  internal_port = 7700
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 7700
    handlers = []

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "15s"

[mounts]
  source = "meili_data"
  destination = "/meili_data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"
  cpus = 2

[env]
  MEILI_ENV = "production"
  MEILI_DB_PATH = "/meili_data/db"
  MEILI_LOG_LEVEL = "INFO"
  MEILI_HTTP_ADDR = "0.0.0.0:7700"
