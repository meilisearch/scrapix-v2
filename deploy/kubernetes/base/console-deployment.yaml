apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: scrapix
  labels:
    app.kubernetes.io/name: console
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: scrapix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: scrapix
    spec:
      containers:
        - name: console
          image: scrapix-console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: SCRAPIX_API_URL
              value: "http://scrapix-api:8080"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
