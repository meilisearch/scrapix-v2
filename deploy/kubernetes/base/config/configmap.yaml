apiVersion: v1
kind: ConfigMap
metadata:
  name: scrapix-config
  namespace: scrapix
  labels:
    app.kubernetes.io/name: scrapix
data:
  # Kafka/Redpanda configuration
  KAFKA_BROKERS: "redpanda:9092"

  # Meilisearch configuration
  MEILISEARCH_URL: "http://meilisearch:7700"

  # Redis/Dragonfly configuration
  REDIS_URL: "redis://dragonfly:6379"

  # Logging
  RUST_LOG: "info,scrapix=debug"

  # Frontier configuration
  DISPATCH_INTERVAL_MS: "100"
  DISPATCH_BATCH_SIZE: "100"
  DOMAIN_DELAY_MS: "1000"
  BLOOM_CAPACITY: "10000000"
  BLOOM_FP_RATE: "0.01"

  # Crawler configuration
  USER_AGENT: "Scrapix/1.0 (compatible; +https://github.com/quentindequelen/scrapix)"
  REQUEST_TIMEOUT: "30"
  MAX_RETRIES: "3"
  MAX_DEPTH: "100"
  RESPECT_ROBOTS: "true"
  CONCURRENCY: "10"

  # Content worker configuration
  BATCH_SIZE: "100"
  BATCH_TIMEOUT_SECS: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: scrapix-secrets
  namespace: scrapix
  labels:
    app.kubernetes.io/name: scrapix
type: Opaque
stringData:
  # Meilisearch master key (change in production!)
  MEILISEARCH_API_KEY: "masterKey"
  # Optional: API authentication key
  # API_KEY: "your-api-key-here"
