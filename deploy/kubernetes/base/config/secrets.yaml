apiVersion: v1
kind: Secret
metadata:
  name: scrapix-secrets
  namespace: scrapix
  labels:
    app.kubernetes.io/name: scrapix
type: Opaque
stringData:
  # REQUIRED: Set these in your overlay or via kubectl create secret
  MEILISEARCH_API_KEY: "CHANGE_ME"
  POSTGRES_PASSWORD: "CHANGE_ME"
  CLICKHOUSE_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME"
  # Optional: API authentication key
  # API_KEY: "your-api-key-here"
  # Optional: OpenAI API key for AI enrichment
  # OPENAI_API_KEY: "your-openai-key-here"
