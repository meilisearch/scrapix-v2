apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  namespace: scrapix
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/component: search
    app.kubernetes.io/part-of: scrapix
spec:
  serviceName: meilisearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meilisearch
        app.kubernetes.io/component: search
        app.kubernetes.io/part-of: scrapix
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.31.0
          ports:
            - name: http
              containerPort: 7700
              protocol: TCP
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: scrapix-secrets
                  key: MEILISEARCH_API_KEY
            - name: MEILI_ENV
              value: "development"
            - name: MEILI_LOG_LEVEL
              value: "INFO"
            - name: MEILI_DB_PATH
              value: "/meili_data"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /meili_data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
