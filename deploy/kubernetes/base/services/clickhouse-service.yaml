apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: scrapix
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: scrapix
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8123
      targetPort: http
      protocol: TCP
    - name: native
      port: 9000
      targetPort: native
      protocol: TCP
  selector:
    app.kubernetes.io/name: clickhouse
