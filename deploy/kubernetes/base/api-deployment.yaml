apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-api
  namespace: scrapix
  labels:
    app.kubernetes.io/name: scrapix-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: scrapix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scrapix-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scrapix-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: scrapix
    spec:
      containers:
        - name: api
          image: scrapix-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: scrapix-config
            - secretRef:
                name: scrapix-secrets
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scrapix-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://scrapix:$(POSTGRES_PASSWORD)@postgres:5432/scrapix"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
