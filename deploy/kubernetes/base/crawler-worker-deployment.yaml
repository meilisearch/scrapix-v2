apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-worker-crawler
  namespace: scrapix
  labels:
    app.kubernetes.io/name: scrapix-worker-crawler
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: scrapix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scrapix-worker-crawler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scrapix-worker-crawler
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: scrapix
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: crawler
          image: scrapix-worker-crawler:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: scrapix-config
            - secretRef:
                name: scrapix-secrets
          env:
            - name: KAFKA_GROUP_ID
              value: "scrapix-crawlers"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      restartPolicy: Always
