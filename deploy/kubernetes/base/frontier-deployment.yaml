apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-frontier
  namespace: scrapix
  labels:
    app.kubernetes.io/name: scrapix-frontier
    app.kubernetes.io/component: frontier
    app.kubernetes.io/part-of: scrapix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scrapix-frontier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scrapix-frontier
        app.kubernetes.io/component: frontier
        app.kubernetes.io/part-of: scrapix
    spec:
      containers:
        - name: frontier
          image: scrapix-frontier-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: scrapix-config
            - secretRef:
                name: scrapix-secrets
          env:
            - name: KAFKA_GROUP_ID
              value: "scrapix-frontier"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      restartPolicy: Always
