---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-worker-content
  namespace: scrapix
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: content
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
