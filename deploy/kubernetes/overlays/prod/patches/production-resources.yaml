# Production resource requirements
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-api
  namespace: scrapix
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: scrapix-api
                topologyKey: kubernetes.io/hostname
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-frontier
  namespace: scrapix
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: frontier
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-worker-crawler
  namespace: scrapix
spec:
  replicas: 5
  template:
    spec:
      containers:
        - name: crawler
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
