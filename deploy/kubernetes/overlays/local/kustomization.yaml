apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference base configuration
resources:
  - ../../base

# Local environment specific configurations
namespace: scrapix

# Add local-specific labels
commonLabels:
  environment: local

# Apply local patches
patches:
  - path: patches/api-nodeport.yaml
  - path: patches/meilisearch-nodeport.yaml
  - path: patches/reduce-resources.yaml
  - path: patches/reduce-storage.yaml

# Override images to use locally built ones
images:
  - name: scrapix-api
    newName: scrapix-api
    newTag: latest
  - name: scrapix-frontier-service
    newName: scrapix-frontier-service
    newTag: latest
  - name: scrapix-worker-crawler
    newName: scrapix-worker-crawler
    newTag: latest
  - name: scrapix-worker-content
    newName: scrapix-worker-content
    newTag: latest
