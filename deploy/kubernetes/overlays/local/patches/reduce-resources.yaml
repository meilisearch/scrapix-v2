# Reduce resource requirements for local development
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-api
  namespace: scrapix
spec:
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-frontier
  namespace: scrapix
spec:
  template:
    spec:
      containers:
        - name: frontier
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-worker-crawler
  namespace: scrapix
spec:
  template:
    spec:
      containers:
        - name: crawler
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapix-worker-content
  namespace: scrapix
spec:
  template:
    spec:
      containers:
        - name: content
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: scrapix
spec:
  template:
    spec:
      containers:
        - name: redpanda
          args:
            - redpanda
            - start
            - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
            - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
            - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
            - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
            - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
            - --rpc-addr 0.0.0.0:33145
            - --advertise-rpc-addr redpanda-0.redpanda:33145
            - --mode dev-container
            - --smp 1
            - --memory 1G
            - --default-log-level=warn
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "1536Mi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  namespace: scrapix
spec:
  template:
    spec:
      containers:
        - name: meilisearch
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dragonfly
  namespace: scrapix
spec:
  template:
    spec:
      containers:
        - name: dragonfly
          image: redis:7-alpine
          args:
            - redis-server
            - --maxmemory
            - 64mb
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
