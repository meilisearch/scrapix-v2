# KEDA ScaledObject — scales content workers based on Kafka consumer lag
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: scrapix-content-scaler
  namespace: scrapix
  labels:
    app.kubernetes.io/name: scrapix-worker-content
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: scrapix
spec:
  scaleTargetRef:
    name: scrapix-worker-content
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 2
  maxReplicaCount: 10
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: redpanda.scrapix.svc.cluster.local:9092
        consumerGroup: scrapix-content
        topic: scrapix.pages.raw
        lagThreshold: "100"
        offsetResetPolicy: earliest
