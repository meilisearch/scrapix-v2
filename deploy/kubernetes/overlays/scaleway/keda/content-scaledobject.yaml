# KEDA ScaledObject — scales content workers based on Kafka consumer lag
# Scales to zero when no messages are pending, spins up on demand
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: scrapix-content-scaler
  namespace: scrapix
  labels:
    app.kubernetes.io/name: scrapix-worker-content
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: scrapix
spec:
  scaleTargetRef:
    name: scrapix-worker-content
  pollingInterval: 10
  cooldownPeriod: 300
  idleReplicaCount: 0
  minReplicaCount: 0
  maxReplicaCount: 10
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 3
              periodSeconds: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: redpanda.scrapix.svc.cluster.local:9092
        consumerGroup: scrapix-content
        topic: scrapix.pages.raw
        lagThreshold: "100"
        activationLagThreshold: "1"
        offsetResetPolicy: earliest
