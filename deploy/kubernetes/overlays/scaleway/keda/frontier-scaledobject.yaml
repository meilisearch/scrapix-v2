# KEDA ScaledObject — scales frontier based on Kafka consumer lag
# Scales to zero when no messages are pending, spins up on demand
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: scrapix-frontier-scaler
  namespace: scrapix
  labels:
    app.kubernetes.io/name: scrapix-frontier
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: scrapix
spec:
  scaleTargetRef:
    name: scrapix-frontier
  pollingInterval: 10
  cooldownPeriod: 300
  idleReplicaCount: 0
  minReplicaCount: 0
  maxReplicaCount: 3
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 180
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 1
              periodSeconds: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: redpanda.scrapix.svc.cluster.local:9092
        consumerGroup: scrapix-frontier
        topic: scrapix.urls.frontier
        lagThreshold: "500"
        activationLagThreshold: "1"
        offsetResetPolicy: earliest
