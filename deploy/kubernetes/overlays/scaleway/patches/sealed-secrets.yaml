# Sealed Secrets placeholder
# In production, replace this with actual SealedSecret resources generated via:
#   kubectl create secret generic scrapix-secrets \
#     --namespace scrapix \
#     --from-literal=MEILISEARCH_API_KEY=<production-key> \
#     --from-literal=POSTGRES_PASSWORD=<production-password> \
#     --from-literal=CLICKHOUSE_PASSWORD=<production-password> \
#     --from-literal=JWT_SECRET=<production-secret> \
#     --dry-run=client -o yaml | kubeseal --format yaml > sealed-secrets.yaml
#
# Requires Sealed Secrets controller installed:
#   helm install sealed-secrets sealed-secrets/sealed-secrets --namespace kube-system
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: scrapix-secrets
  namespace: scrapix
spec:
  encryptedData:
    # These are placeholder values — regenerate with kubeseal before deploying
    MEILISEARCH_API_KEY: AgA...REPLACE_WITH_SEALED_VALUE
    POSTGRES_PASSWORD: AgA...REPLACE_WITH_SEALED_VALUE
    CLICKHOUSE_PASSWORD: AgA...REPLACE_WITH_SEALED_VALUE
    JWT_SECRET: AgA...REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: scrapix-secrets
      namespace: scrapix
    type: Opaque
