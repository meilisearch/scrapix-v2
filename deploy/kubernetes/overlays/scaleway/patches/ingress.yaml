# Ingress with TLS via cert-manager + nginx ingress controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scrapix-ingress
  namespace: scrapix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # WebSocket support for API
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.scrapix.meilisearch.net
        - console.scrapix.meilisearch.net
      secretName: scrapix-tls
  rules:
    - host: api.scrapix.meilisearch.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scrapix-api
                port:
                  number: 8080
    - host: console.scrapix.meilisearch.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console
                port:
                  number: 3000
