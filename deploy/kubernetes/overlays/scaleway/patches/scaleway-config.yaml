# Scaleway production configuration — tuned for high throughput
apiVersion: v1
kind: ConfigMap
metadata:
  name: scrapix-config
  namespace: scrapix
data:
  # Logging
  RUST_LOG: "info"

  # Frontier configuration - tuned for high throughput
  DISPATCH_INTERVAL_MS: "20"
  DISPATCH_BATCH_SIZE: "2000"
  DOMAIN_DELAY_MS: "50"
  CONCURRENT_PER_DOMAIN: "50"
  BLOOM_CAPACITY: "100000000"
  BLOOM_FP_RATE: "0.001"

  # Crawler configuration - high concurrency
  CONCURRENCY: "50"
  REQUEST_TIMEOUT: "30"
  MAX_RETRIES: "3"
  MAX_DEPTH: "100"
  RESPECT_ROBOTS: "true"

  # Content worker configuration - large batches
  BATCH_SIZE: "2000"
  BATCH_TIMEOUT_SECS: "10"

  # Meilisearch - production mode
  MEILI_ENV: "production"
