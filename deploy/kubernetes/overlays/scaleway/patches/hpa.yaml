# API HPA — min 1 to save cost when idle, scales up under load
# Crawler/content/frontier scaling handled by KEDA ScaledObjects (scale-to-zero)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scrapix-api-hpa
  namespace: scrapix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scrapix-api
  minReplicas: 1
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
