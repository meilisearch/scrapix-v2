# API HPA only — crawler/content/frontier scaling handled by KEDA ScaledObjects
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scrapix-api-hpa
  namespace: scrapix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scrapix-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
