name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_api:
        description: "Force deploy API"
        type: boolean
        default: false
      force_console:
        description: "Force deploy Console"
        type: boolean
        default: false

jobs:
  # Run CI first — deploy only if checks pass
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # Detect which parts of the codebase changed
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      console: ${{ steps.filter.outputs.console }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'crates/**'
              - 'bins/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile.heroku'
            console:
              - 'console/**'

  deploy-api:
    name: Deploy API
    needs: [ci, changes]
    if: needs.changes.outputs.api == 'true' || inputs.force_api == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Heroku Container Registry
        run: echo "${{ secrets.HEROKU_API_KEY }}" | docker login registry.heroku.com -u _ --password-stdin

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.heroku
          push: true
          provenance: false
          tags: registry.heroku.com/scrapix-api/web
          cache-from: type=gha,scope=heroku-api
          cache-to: type=gha,mode=max,scope=heroku-api

      - name: Release API on Heroku
        run: |
          IMAGE_ID=$(docker inspect registry.heroku.com/scrapix-api/web --format='{{.Id}}')
          curl -sf -X PATCH "https://api.heroku.com/apps/scrapix-api/formation" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}" \
            -d '{"updates": [{"type": "web", "docker_image": "'"$IMAGE_ID"'"}]}'

  deploy-console:
    name: Deploy Console
    needs: [ci, changes]
    if: needs.changes.outputs.console == 'true' || inputs.force_console == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Heroku Container Registry
        run: echo "${{ secrets.HEROKU_API_KEY }}" | docker login registry.heroku.com -u _ --password-stdin

      - name: Build and push Console image
        uses: docker/build-push-action@v7
        with:
          context: ./console
          file: ./console/Dockerfile
          push: true
          provenance: false
          tags: registry.heroku.com/scrapix-console/web
          cache-from: type=gha,scope=heroku-console
          cache-to: type=gha,mode=max,scope=heroku-console

      - name: Release Console on Heroku
        run: |
          IMAGE_ID=$(docker inspect registry.heroku.com/scrapix-console/web --format='{{.Id}}')
          curl -sf -X PATCH "https://api.heroku.com/apps/scrapix-console/formation" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}" \
            -d '{"updates": [{"type": "web", "docker_image": "'"$IMAGE_ID"'"}]}'
